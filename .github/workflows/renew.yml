name: DigitalPlat Domain Renew

on:
  schedule:
    - cron: '0 20 */3 * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system libs & sing-box
        run: |
          sudo apt-get update || true
          sudo apt-get install -y libdbus-glib-1-2 libgbm-dev libgdk-pixbuf-xlib-2.0-0 libgdk-pixbuf2.0-0 libgdk-pixbuf2.0-bin libnss3 libnss3-tools libasound2t64 libx11-xcb1 libxcomposite1 libxcursor1 libxdamage1 libxfixes3 libxi6 libxtst6 libcups2 libatk1.0-0 libatk-bridge2.0-0 libpangocairo-1.0-0 libharfbuzz0b libpango-1.0-0 libcairo2 libglib2.0-0 libdrm2 || true

          SB_VERSION=1.9.7
          wget https://github.com/SagerNet/sing-box/releases/download/v${SB_VERSION}/sing-box-${SB_VERSION}-linux-amd64.tar.gz
          tar -zxvf sing-box-${SB_VERSION}-linux-amd64.tar.gz
          sudo cp sing-box-${SB_VERSION}-linux-amd64/sing-box /usr/local/bin/
          sing-box version

      - name: Start VLESS to SOCKS5 proxy
        env:
          VLESS_JSON: ${{ secrets.VLESS_CONFIG }}
        run: |
          echo "$VLESS_JSON" > config.json
          sing-box run -c config.json > sb.log 2>&1 &
          sleep 12
          echo "代理启动完成：socks5://127.0.0.1:1080"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run renew script
        env:
          DP_EMAIL: ${{ secrets.DP_EMAIL }}
          DP_PASSWORD: ${{ secrets.DP_PASSWORD }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
          BARK_SERVER: ${{ secrets.BARK_SERVER }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          SOCKS5_PROXY: socks5://127.0.0.1:1080
        run: python renew.py

      - name: Upload error screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: screenshot_log/
